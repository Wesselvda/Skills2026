<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #dddddd;
            gap: 2rem;
        }

        canvas {
            background-color: #fff;
            height: 80vmin;
            width: 80vmin;
        }
    </style>
</head>
<body>
    <canvas width="1000" height="1000"></canvas>
    <form id="image-form">
        <input type="number" id="number-value" min="1" step="1">
        <button type="submit">Draw</button>
    </form>
    <script>
        const canvas = document.querySelector('canvas');
        const ctx = canvas.getContext('2d');
        const form = document.getElementById('image-form');
        const numberInput = document.getElementById('number-value');

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function fillTriangle(x1, y1, x2, y2, x3, y3) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.lineTo(x3, y3);
            ctx.closePath();
            ctx.fillStyle = "#000";
            ctx.fill();
        }

        function generateFractal(x1, y1, x2, y2, x3, y3, depth) {
            if (depth <= 0) {
                fillTriangle(x1, y1, x2, y2, x3, y3);
                return;
            }

            const mx12 = (x1 + x2) / 2;
            const my12 = (y1 + y2) / 2;
            const mx23 = (x2 + x3) / 2;
            const my23 = (y2 + y3) / 2;
            const mx31 = (x3 + x1) / 2;
            const my31 = (y3 + y1) / 2;

            generateFractal(x1, y1, mx12, my12, mx31, my31, depth - 1);
            generateFractal(mx12, my12, x2, y2, mx23, my23, depth - 1);
            generateFractal(mx31, my31, mx23, my23, x3, y3, depth - 1);
        }

        function drawImage(value) {
            clearCanvas();

            const depth = value;
            const margin = 10;
            const w = canvas.width;
            const h = canvas.height;

            const x1 = w / 2;
            const y1 = margin;
            const x2 = margin;
            const y2 = h - margin;
            const x3 = w - margin;
            const y3 = h - margin;

            generateFractal(x1, y1, x2, y2, x3, y3, depth);
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const numberValue = parseInt(numberInput.value, 10);
            drawImage(numberValue);
        });
    </script>
</body>
</html>
