<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #000;
      }

      .goo-wrapper {
        filter: blur(10px) contrast(100000000000%);
        background-color: #000;
        padding: 5vmin;
      }

      .drip-container {
        position: relative;
        width: 90vmin;
        height: 90vmin;
      }

      .drip-bar {
        background-color: #fff;
        border-radius: 100rem;
        width: 100%;
        height: 10%;
        position: absolute;
      }

      .drip-bottom {
        bottom: 0;
      }
      .drip-top {
        top: 0;
      }

      .drop {
        position: absolute;
        top: 5%;
        left: 50%;
        width: 10%;
        height: 10%;
        background-color: #fff;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        animation: drip 2s ease infinite;
      }

      @keyframes drip {
        0% {
          top: 5%;
          opacity: 1;
        }
        100% {
          top: 95%;
        }
      }
    </style>
  </head>
  <body>
    <div class="goo-wrapper">
      <div class="drip-container">
        <div class="drip-top drip-bar"></div>
        <div class="drop"></div>
        <div class="drip-bottom drip-bar"></div>
      </div>
    </div>
  </body>
</html>
